<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TippRadar AI v1.0 REAL</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚽ TippRadar AI</h1>
  <div class="version">v1.0 REAL</div>
  <p>Valódi kézi meccsfeltöltés + AI elemzés</p>
</header>

<main>

  <section class="panel">
    <h2>📥 Napi meccsek feltöltése</h2>
    <p>Formátum soronként:</p>
    <p class="hint">Liga | Hazai | Vendég | Odds</p>

    <textarea id="matchInput" placeholder="NB I | FTC | Paks | 1.82&#10;Premier League | Liverpool | Arsenal | 1.74"></textarea>

    <button onclick="loadManualMatches()">Meccsek betöltése</button>
  </section>

  <section class="panel">
    <input id="searchInput" placeholder="Keresés csapatra vagy ligára..." oninput="renderMatches()">
    <button onclick="showTop()">🔥 Top AI lista</button>
    <button onclick="buildTicket()">🧾 Szelvényépítő</button>
  </section>

  <section id="ticketBox" class="panel hidden"></section>

  <section id="matches"></section>

</main>

<nav>
  <button onclick="renderMatches()">🏠 Mai</button>
  <button onclick="showTop()">🔥 Top</button>
  <button onclick="showFavorites()">⭐ Kedvenc</button>
</nav>

<script src="matches.js"></script>
<script src="ai.js"></script>
<script src="app.js"></script>

</body>
</html>
