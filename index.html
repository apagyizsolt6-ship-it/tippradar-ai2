<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TippRadar AI v0.4 Final</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#07121a;
  color:white;
  padding-bottom:85px;
}

header{
  background:#0b1722;
  padding:22px 16px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:5;
}

h1{
  margin:0;
  color:#00ff99;
  font-size:32px;
}

.small{
  color:#9ca3af;
  margin-top:6px;
  font-size:14px;
}

.wrap{
  padding:16px;
}

.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:0;
  background:#1e293b;
  color:white;
  font-size:16px;
  margin-bottom:12px;
}

.btns{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}

button{
  border:0;
  border-radius:22px;
  padding:12px 16px;
  background:#1e293b;
  color:white;
  font-weight:bold;
  white-space:nowrap;
}

button.active{
  background:#00c853;
}

select{
  width:100%;
  padding:13px;
  border-radius:14px;
  background:#1e293b;
  color:white;
  border:0;
  margin-bottom:15px;
  font-size:16px;
}

.card{
  background:#142033;
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 8px 22px rgba(0,0,0,.25);
}

.league{
  color:#00ff99;
  font-size:14px;
  margin-bottom:8px;
}

.match{
  font-size:24px;
  font-weight:bold;
  margin:10px 0 14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.box{
  background:#0b1722;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.box span{
  color:#9ca3af;
  font-size:12px;
}

.box b{
  display:block;
  color:#00ff99;
  font-size:25px;
  margin-top:4px;
}

.tip{
  margin-top:14px;
  padding:13px;
  border:1px solid #00c853;
  border-radius:12px;
  background:#052e1a;
  line-height:1.45;
}

.warn{color:#facc15}
.odds{color:#38bdf8;font-weight:bold}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b1722;
  display:flex;
  justify-content:space-around;
  padding:12px 4px;
  border-top:1px solid #1e293b;
}

.nav div{
  text-align:center;

  color:#cbd5e1;
  font-size:13px;
}
</style>
</head><body>

<header>
  <h1>⚽ TippRadar AI</h1>
  <div class="small">v0.4 Final – mobilos AI sportelemző</div>
</header>

<div class="wrap">

<input
  class="search"
  id="search"
  placeholder="Keresés csapatra vagy bajnokságra..."
  oninput="render()"
>

<div class="btns">
  <button onclick="show('all')">Összes</button>
  <button onclick="show('top')">🔥 Top</button>
  <button onclick="show('fav')">⭐ Kedvenc</button>
  <button onclick="show('profile')">👤 Profil</button>
</div>

<select id="leagueFilter" onchange="render()">
  <option value="all">Minden liga</option>
  <option value="Olaszország">Olaszország</option>
  <option value="Spanyolország">Spanyolország</option>
  <option value="Anglia">Anglia</option>
  <option value="Németország">Németország</option>
  <option value="Franciaország">Franciaország</option>
  <option value="Magyarország">Magyarország</option>
  <option value="Hollandia">Hollandia</option>
  <option value="Portugália">Portugália</option>
</select>

<div id="app"></div>

</div>

<div class="nav">
  <div onclick="show('all')">🏠<br>Mai</div>
  <div onclick="show('top')">🔥<br>Top</div>
  <div onclick="show('fav')">⭐<br>Kedvenc</div>
  <div onclick="show('profile')">👤<br>Profil</div>
</div><script>

let mode="all";

let fav = JSON.parse(localStorage.getItem("fav") || "[]");

const games=[

["Olaszország","Roma","Lazio",66,70,73,91,58,"Lap Over",1.82],
["Spanyolország","Barcelona","Valencia",89,82,77,61,55,"Over 2.5",1.67],
["Anglia","Liverpool","Arsenal",84,86,81,74,62,"BTTS",1.74],
["Németország","Dortmund","Leipzig",88,84,79,68,64,"Over 2.5",1.70],
["Franciaország","PSG","Lyon",81,76,85,59,72,"Szöglet Over",1.90],
["Magyarország","FTC","Paks",78,74,69,82,51,"Lap Over",1.95],
["Hollandia","Ajax","Feyenoord",86,80,83,76,67,"BTTS",2.05],
["Portugália","Benfica","Porto",72,75,80,89,60,"Lap Over",1.83]

];

function show(m){
mode=m;
render();
}

function toggle(name){
if(fav.includes(name))
fav=fav.filter(x=>x!=name);
else
fav.push(name);

localStorage.setItem("fav",JSON.stringify(fav));

render();
}

function render(){

const app=document.getElementById("app");

const q=document.getElementById("search").value.toLowerCase();

const league=document.getElementById("leagueFilter").value;

if(mode=="profile"){

app.innerHTML=`

<div class="card">

<h2>👤 Profil</h2>

<p>Kedvencek száma:
<b>${fav.length}</b></p>

<p>Verzió:
<b>v0.4 Final</b></p>

<p>Mentés:
<b>LocalStorage</b></p>

</div>

`;

return;

}

let html="";let list=[...games];

list=list.filter(g=>{
let text=(g[0]+" "+g[1]+" "+g[2]).toLowerCase();
return text.includes(q);
});

if(league!="all"){
list=list.filter(g=>g[0]==league);
}

if(mode=="top"){
list=list.filter(g=>Math.max(g[3],g[4],g[5],g[6],g[7])>=85);
}

if(mode=="fav"){
list=list.filter(g=>fav.includes(g[1]+"-"+g[2]));
}

list.sort((a,b)=>{
let ba=Math.max(a[3],a[4],a[5],a[6],a[7]);
let bb=Math.max(b[3],b[4],b[5],b[6],b[7]);
return bb-ba;
});

list.forEach(g=>{

let best=Math.max(g[3],g[4],g[5],g[6],g[7]);
let id=g[1]+"-"+g[2];
let saved=fav.includes(id);

let confidence =
best>=90 ? "Nagyon erős" :
best>=85 ? "Erős" :
best>=75 ? "Közepes" :
"Kockázatos";

let risk =
best>=90 ? "Alacsony" :
best>=80 ? "Közepes" :
"Magas";

html+=`

<div class="card">

<div class="league">${g[0]}</div>

<div class="match">${g[1]} – ${g[2]}</div>

<div class="grid">

<div class="box"><span>Goal</span><b>${g[3]}</b></div>
<div class="box"><span>BTTS</span><b>${g[4]}</b></div>
<div class="box"><span>Corner</span><b>${g[5]}</b></div>
<div class="box"><span>Cards</span><b>${g[6]}</b></div>
<div class="box"><span>Offside</span><b>${g[7]}</b></div>
<div class="box"><span>Best</span><b>${best}</b></div>

</div>

<div class="tip">
Ajánlott piac: <b>${g[8]}</b><br>
Odds: <span class="odds">${g[9]}</span><br>
Confidence: <b>${confidence}</b><br>
Kockázat: <span class="warn">${risk}</span><br><br>
AI elemzés: a legerősebb adatjel ${best}/100. Ez alapján a(z) ${g[8]} piac emelkedik ki. Ez nem biztos tipp, hanem döntéstámogató statisztikai jelzés.
</div>

<br>

<button onclick="toggle('${id}')">${saved ? "⭐ Mentve" : "☆ Kedvenchez adás"}</button>

</div>

`;

});

app.innerHTML=html || `<div class="card">Nincs találat.</div>`;

}

render();

</script>

</body>
</html>
